name: Determinism Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install -e .

      - name: Create local worker fixture (no external checkout)
        shell: bash
        run: |
          set -euo pipefail
          # Create a minimal deterministic fixture at the worker location declared in worker.yaml.
          WORKER_DIR="$(python - <<'PY'
          from __future__ import annotations

          from pathlib import Path

          import yaml

          worker_yaml = Path('workers/gmail_bill_intelligence/worker.yaml')
          data = yaml.safe_load(worker_yaml.read_text(encoding='utf-8'))
          rel = Path(data['location']['path'])
          print((Path.cwd() / rel).resolve())
          PY
          )"

          mkdir -p "$WORKER_DIR/bootstrap" "$WORKER_DIR/app/pipeline" "$WORKER_DIR/app/domain" "$WORKER_DIR/data/input"

          cat > "$WORKER_DIR/bootstrap/bootstrap_adapter.py" <<'PY'
          from __future__ import annotations

          from typing import Any, Callable


          def run_phase(phase_name: str, context: dict[str, Any]) -> dict[str, Any]:
              from app.pipeline import phase_01_ingest, phase_06_generate_schedule

              phase_map: dict[str, Callable[[dict[str, Any]], dict[str, Any]]] = {
                  "ingest": phase_01_ingest.run,
                  "schedule": phase_06_generate_schedule.run,
              }

              if phase_name in phase_map:
                  return phase_map[phase_name](context)

              # Deterministic no-op for phases not implemented in the CI fixture.
              return {
                  "success": True,
                  "outputs": [],
                  "evidence": [],
                  "metadata": {"fixture_noop": True, "phase": phase_name},
                  "message": f"(fixture) Skipped phase: {phase_name}",
              }
          PY

          cat > "$WORKER_DIR/app/pipeline/phase_01_ingest.py" <<'PY'
          import json
          from pathlib import Path
          from typing import Dict, Any

          def run(context: Dict[str, Any]) -> Dict[str, Any]:
              resolve_worker_path = getattr(context, "resolve_worker_path", None)
              if not callable(resolve_worker_path):
                  raise ValueError("Context missing resolve_worker_path()")

              worker_root = Path(resolve_worker_path(scope="worker"))
              runtime_root = Path(resolve_worker_path())
              input_file = worker_root / "data" / "input" / "mock_emails.json"

              emails = json.loads(input_file.read_text(encoding="utf-8"))
              emails = sorted(emails, key=lambda x: (x["due_date"], x["vendor"]))
              context["state"]["mock_emails"] = emails

              raw_emails_dir = runtime_root / "data" / "raw_emails"
              return {
                  "success": True,
                  "outputs": [str(raw_emails_dir)],
                  "evidence": [],
                  "metadata": {"emails_scanned": len(emails)},
                  "message": f"Ingested {len(emails)} emails",
              }
          PY

          cat > "$WORKER_DIR/app/pipeline/phase_06_generate_schedule.py" <<'PY'
          import hashlib
          import json
          from pathlib import Path
          from typing import Dict, Any, List

          def _stable_hash_json(obj: Any) -> str:
              content = json.dumps(obj, indent=2, ensure_ascii=False, sort_keys=True)
              return hashlib.sha256(content.encode("utf-8")).hexdigest()

          def run(context: Dict[str, Any]) -> Dict[str, Any]:
              resolve_worker_path = getattr(context, "resolve_worker_path", None)
              if not callable(resolve_worker_path):
                  raise ValueError("Context missing resolve_worker_path()")

              runtime_root = Path(resolve_worker_path())
              emails: List[Dict[str, Any]] = context.get("state", {}).get("mock_emails", [])
              if not emails:
                  raise ValueError("No emails in context state")

              # Deterministic schedule content
              lines = ["# Bill Schedule\n", "## All Bills\n"]
              for e in sorted(emails, key=lambda x: (x["due_date"], x["vendor"])):
                  lines.append(f"**Vendor:** {e['vendor']}  ")
                  lines.append(f"**Amount:** ${float(e['amount']):.2f}  ")
                  lines.append(f"**Due:** {e['due_date']}  ")
                  lines.append("\n")
              schedule_content = "\n".join(lines)
              schedule_hash = hashlib.sha256(schedule_content.encode("utf-8")).hexdigest()

              # Deterministic ledger hash derived from the same data
              ledger_obj = [
                  {"vendor": e["vendor"], "amount": float(e["amount"]), "due_date": e["due_date"]}
                  for e in sorted(emails, key=lambda x: (x["due_date"], x["vendor"]))
              ]
              ledger_hash = _stable_hash_json(ledger_obj)

              schedule_path = runtime_root / "reports" / "bills_schedule.md"
              ledger_path = runtime_root / "data" / "ledger" / "bill_ledger.json"

              return {
                  "success": True,
                  "outputs": [str(schedule_path), str(ledger_path)],
                  "evidence": [],
                  "metadata": {
                      "output_hash": schedule_hash,
                      "schedule_hash": schedule_hash,
                      "ledger_hash": ledger_hash,
                  },
                  "message": "Generated schedule",
              }
          PY

          cat > "$WORKER_DIR/app/pipeline/__init__.py" <<'PY'
          # pipeline package
          PY

          cat > "$WORKER_DIR/app/__init__.py" <<'PY'
          # app package
          PY

          cat > "$WORKER_DIR/data/input/mock_emails.json" <<'JSON'
          [
            {"message_id": "msg001", "vendor": "Vendor A", "amount": 150.0, "due_date": "2026-03-05"},
            {"message_id": "msg002", "vendor": "Vendor B", "amount": 200.0, "due_date": "2026-03-12"},
            {"message_id": "msg003", "vendor": "Vendor C", "amount": 75.0, "due_date": "2026-03-20"}
          ]
          JSON

      - name: Run doctor + selftest
        env:
          WORKER_RUNTIME_DIR: ${{ runner.temp }}/worker-runtime
          BOOTSTRAP_GOVERNANCE_DIR: ${{ runner.temp }}/bootstrap-governance
        run: |
          mkdir -p "$WORKER_RUNTIME_DIR" "$BOOTSTRAP_GOVERNANCE_DIR"
          run-bootstrap doctor
          run-bootstrap selftest --worker gmail_bill_intelligence
