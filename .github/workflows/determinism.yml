name: Determinism Check

on:
  push:
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          path: ai-governance-bootstrap

      # This worker repo is required because workers/gmail_bill_intelligence/worker.yaml
      # resolves to ../gmail-bills from within the bootstrap repo.
      #
      # If the worker repo name differs, change `repository:` accordingly.
      # For private repos, you must add a PAT as a secret (e.g. WORKER_REPO_TOKEN)
      # with read access to that repo.
      - name: Checkout gmail-bills worker
        uses: actions/checkout@v4
        with:
          repository: SamTuineau/gmail-bills
          path: gmail-bills
          token: ${{ secrets.WORKER_REPO_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bootstrap (editable)
        working-directory: ai-governance-bootstrap
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run doctor + selftest
        working-directory: ai-governance-bootstrap
        env:
          WORKER_RUNTIME_DIR: ${{ runner.temp }}/worker-runtime
          BOOTSTRAP_GOVERNANCE_DIR: ${{ runner.temp }}/bootstrap-governance
        run: |
          mkdir -p "$WORKER_RUNTIME_DIR" "$BOOTSTRAP_GOVERNANCE_DIR"
          run-bootstrap doctor
          run-bootstrap selftest --worker gmail_bill_intelligence
